name: The Ghost Alpha - 24/7 Cloud Swarm

on:
  schedule:
    # Her 6 saatte bir uyan (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manuel tetikleme için (Test amaçlı)

jobs:
  scrape_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        playwright install chromium --with-deps

    - name: Run The Ghost Alpha Swarm
      env:
        # GitHub Secrets üzerinden gelecek anahtarlar
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        OLLAMA_MODEL: "llama3.1" # Bulutta bu Groq'a düşecek
      run: python main.py

    - name: Upload Artifacts (CSV Results)
      uses: actions/upload-artifact@v4
      with:
        name: daily-signals
        path: "*.csv"
        retention-days: 7
