name: The Ghost Alpha v2.0 — 24/7 Intelligence Engine

on:
  schedule:
    # Fires every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    # Each run loops for 5h45m then exits cleanly — achieving near-continuous coverage
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  intelligence_sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Hard cap at 5h50m (just above our internal 5h45m limit)

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        playwright install chromium --with-deps

    - name: Run The Ghost Alpha Intelligence Engine
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      run: python main.py

    - name: Upload Intelligence Signals (JSON artifacts)
      if: always()  # Upload even if there's a partial failure
      uses: actions/upload-artifact@v4
      with:
        name: intelligence-signals-${{ github.run_number }}
        path: signals/
        retention-days: 30
